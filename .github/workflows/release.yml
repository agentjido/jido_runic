name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run a Hex dry run instead of publishing"
        required: false
        type: boolean
        default: true
      hex_dry_run:
        description: "Hex dry run only (run all git/release steps, but skip actual Hex publish)"
        required: false
        type: boolean
        default: false
      skip_tests:
        description: "Skip tests before release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    uses: agentjido/github-actions/.github/workflows/elixir-release.yml@v3
    with:
      otp_version: "28"
      elixir_version: "1.19"
      dry_run: ${{ inputs.dry_run }}
      hex_dry_run: ${{ inputs.hex_dry_run }}
      skip_tests: ${{ inputs.skip_tests }}
    secrets: inherit
